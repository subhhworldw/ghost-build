<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS Calculator Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator" aria-label="Calculator">
        <output id="display" class="display" aria-live="polite">0</output>
        <div class="keys" role="group" aria-label="Calculator buttons">
          <button class="key utility" data-action="clear">AC</button>
          <button class="key utility" data-action="sign">+/-</button>
          <button class="key utility" data-action="percent">%</button>
          <button class="key operator" data-action="operator" data-value="divide">÷</button>

          <button class="key digit" data-action="digit" data-value="7">7</button>
          <button class="key digit" data-action="digit" data-value="8">8</button>
          <button class="key digit" data-action="digit" data-value="9">9</button>
          <button class="key operator" data-action="operator" data-value="multiply">×</button>

          <button class="key digit" data-action="digit" data-value="4">4</button>
          <button class="key digit" data-action="digit" data-value="5">5</button>
          <button class="key digit" data-action="digit" data-value="6">6</button>
          <button class="key operator" data-action="operator" data-value="subtract">−</button>

          <button class="key digit" data-action="digit" data-value="1">1</button>
          <button class="key digit" data-action="digit" data-value="2">2</button>
          <button class="key digit" data-action="digit" data-value="3">3</button>
          <button class="key operator" data-action="operator" data-value="add">+</button>

          <button class="key digit zero" data-action="digit" data-value="0">0</button>
          <button class="key digit" data-action="decimal">.</button>
          <button class="key operator" data-action="equals">=</button>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
